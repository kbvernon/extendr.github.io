[package]
name = 'examples'
publish = false
version = '0.1.0'
edition = '2021'
rust-version = '1.65'

[lib]
crate-type = [ 'rlib', 'staticlib' ]
name = 'examples'

[[bin]]
name = 'document'
path = 'document.rs'

[dependencies]
extendr-api = { version = '0.9.0', features = ['serde'] }
serde = { version = '1', features = ['derive'] }

[profile.release]
lto = true
codegen-units = 1
